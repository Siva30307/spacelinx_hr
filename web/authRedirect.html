<!DOCTYPE html>
<html>

<head>
    <title>Authenticating...</title>
</head>

<body>
    <script>
        // This file is used by aad_oauth for web redirection
        // It receives the auth token from Azure and passes it back to the Flutter app
        if (window.opener) {
            window.opener.postMessage(window.location.href, '*');
        }
    </script>
</body>

</html>
